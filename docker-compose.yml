services:
  vidback:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/itsdvvn/vidback:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://vidback:${DB_PASSWORD:-vidback_secret_2026}@vidback-db:5432/vidback
    depends_on:
      vidback-db:
        condition: service_healthy
    networks:
      - coolify
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vidback.rule=Host(`vidback.yudhisetiawan.my.id`)"
      - "traefik.http.routers.vidback.entrypoints=websecure"
      - "traefik.http.routers.vidback.tls.certresolver=myresolver"
      - "traefik.http.services.vidback.loadbalancer.server.port=3000"

  vidback-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - vidback-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=vidback
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vidback_secret_2026}
      - POSTGRES_DB=vidback
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidback"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - coolify

volumes:
  vidback-db-data:

networks:
  coolify:
    external: true
  proxy:
    external: true
